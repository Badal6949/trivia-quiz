<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Daily Trivia Streak Quiz</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg: #ffffff;
    --bg-secondary: #f0f2f5;
    --text: #000000;
    --text-secondary: #666666;
    --accent: #3390ec;
    --accent-hover: #2b7fd4;
    --correct: #4caf50;
    --wrong: #f44336;
    --card-bg: #ffffff;
    --border: #e0e0e0;
    --shadow: 0 2px 8px rgba(0,0,0,0.1);
    --flame: #ff6b35;
    --coin: #ffc107;
    --hint: #9c27b0;
    --freeze: #00bcd4;
  }

  html[data-theme="dark"] {
    --bg: #1a1a2e;
    --bg-secondary: #16213e;
    --text: #e0e0e0;
    --text-secondary: #8888aa;
    --accent: #5eb5f7;
    --accent-hover: #3390ec;
    --correct: #66bb6a;
    --wrong: #ef5350;
    --card-bg: #1e2a45;
    --border: #2a3a5c;
    --shadow: 0 2px 8px rgba(0,0,0,0.4);
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    transition: background 0.3s, color 0.3s;
  }

  .screen {
    display: none;
    padding: 16px;
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    animation: fadeIn 0.3s ease;
  }

  .screen.active { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-5px); }
    75% { transform: translateX(5px); }
  }

  @keyframes correctPop {
    0% { transform: scale(1); }
    50% { transform: scale(1.08); }
    100% { transform: scale(1); }
  }

  @keyframes confetti {
    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(-200px) rotate(720deg); opacity: 0; }
  }

  /* Theme Toggle */
  .theme-toggle {
    position: fixed;
    top: 12px;
    right: 12px;
    z-index: 100;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: var(--card-bg);
    color: var(--text);
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: var(--shadow);
    transition: all 0.3s;
  }

  .theme-toggle:hover { border-color: var(--accent); }

  /* Home Screen */
  .user-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
    padding: 16px;
    background: var(--card-bg);
    border-radius: 16px;
    box-shadow: var(--shadow);
    transition: background 0.3s;
  }

  .avatar {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 24px;
    font-weight: 700;
    flex-shrink: 0;
    overflow: hidden;
  }

  .avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .user-info h2 {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 2px;
  }

  .user-info p {
    font-size: 13px;
    color: var(--text-secondary);
  }

  .stats-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin-bottom: 20px;
  }

  .stat-card {
    background: var(--card-bg);
    border-radius: 14px;
    padding: 14px 10px;
    text-align: center;
    box-shadow: var(--shadow);
    transition: background 0.3s;
  }

  .stat-icon { font-size: 22px; margin-bottom: 4px; }
  .stat-value { font-size: 22px; font-weight: 800; line-height: 1.2; }
  .stat-label {
    font-size: 11px;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .multiplier-badge {
    display: inline-block;
    background: linear-gradient(135deg, #ff6b35, #ff9a56);
    color: white;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
    margin-top: 4px;
  }

  .play-btn {
    width: 100%;
    padding: 18px;
    border: none;
    border-radius: 16px;
    background: linear-gradient(135deg, var(--accent), #5eb5f7);
    color: white;
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    margin-bottom: 16px;
    transition: all 0.2s;
    box-shadow: 0 4px 15px rgba(51, 144, 236, 0.4);
  }

  .play-btn:hover { transform: translateY(-1px); }
  .play-btn:active { transform: translateY(1px); }

  .play-btn:disabled {
    background: var(--bg-secondary);
    color: var(--text-secondary);
    box-shadow: none;
    cursor: not-allowed;
    transform: none;
  }

  .countdown-text {
    font-size: 14px;
    color: var(--text-secondary);
    text-align: center;
    margin-top: 8px;
  }

  .shop-section { margin-bottom: 20px; }

  .section-title {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .shop-items {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .shop-item {
    background: var(--card-bg);
    border-radius: 14px;
    padding: 14px;
    box-shadow: var(--shadow);
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    border: 2px solid transparent;
  }

  .shop-item:hover { border-color: var(--accent); }
  .shop-item:disabled { opacity: 0.5; cursor: not-allowed; }
  .shop-item-icon { font-size: 28px; margin-bottom: 6px; }
  .shop-item-name { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
  .shop-item-cost { font-size: 12px; color: var(--coin); font-weight: 700; }
  .shop-item-owned { font-size: 11px; color: var(--correct); font-weight: 600; }

  .leaderboard {
    background: var(--card-bg);
    border-radius: 14px;
    padding: 16px;
    box-shadow: var(--shadow);
    transition: background 0.3s;
  }

  .leaderboard-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid var(--bg-secondary);
  }

  .leaderboard-item:last-child { border-bottom: none; }

  .lb-rank {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--bg-secondary);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
    flex-shrink: 0;
  }

  .lb-rank.gold { background: #ffd700; color: #000; }
  .lb-rank.silver { background: #c0c0c0; color: #000; }
  .lb-rank.bronze { background: #cd7f32; color: #fff; }

  .lb-name { flex: 1; font-size: 14px; font-weight: 600; }
  .lb-score { font-size: 14px; color: var(--text-secondary); }

  /* Quiz Screen */
  .quiz-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }

  .quiz-progress {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-secondary);
  }

  .quiz-timer {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: 3px solid var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 800;
    position: relative;
  }

  .quiz-timer.warning { border-color: var(--wrong); color: var(--wrong); animation: pulse 1s infinite; }

  .timer-ring {
    position: absolute;
    top: -3px;
    left: -3px;
    width: 48px;
    height: 48px;
  }

  .timer-ring circle { fill: none; stroke-width: 3; cx: 24; cy: 24; r: 21; }
  .timer-bg { stroke: var(--bg-secondary); }

  .timer-progress {
    stroke: var(--accent);
    stroke-dasharray: 132;
    stroke-dashoffset: 0;
    transform: rotate(-90deg);
    transform-origin: center;
    transition: stroke-dashoffset 1s linear, stroke 0.3s;
  }

  .timer-progress.warning { stroke: var(--wrong); }

  .hint-btn {
    padding: 8px 14px;
    border: 2px solid var(--hint);
    border-radius: 20px;
    background: transparent;
    color: var(--hint);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .hint-btn:hover { background: var(--hint); color: white; }
  .hint-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .question-card {
    background: var(--card-bg);
    border-radius: 16px;
    padding: 24px 20px;
    box-shadow: var(--shadow);
    margin-bottom: 16px;
    min-height: 100px;
    transition: background 0.3s;
  }

  .question-category {
    font-size: 12px;
    color: var(--accent);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }

  .question-text { font-size: 18px; font-weight: 700; line-height: 1.4; }

  .options-grid { display: flex; flex-direction: column; gap: 10px; }

  .option-btn {
    width: 100%;
    padding: 16px 18px;
    border: 2px solid var(--border);
    border-radius: 14px;
    background: var(--card-bg);
    color: var(--text);
    font-size: 15px;
    font-weight: 500;
    text-align: left;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .option-btn:hover { border-color: var(--accent); background: rgba(51, 144, 236, 0.05); }

  .option-label {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: var(--bg-secondary);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
    flex-shrink: 0;
    transition: background 0.3s;
  }

  .option-btn.correct { border-color: var(--correct); background: rgba(76, 175, 80, 0.1); animation: correctPop 0.3s ease; }
  .option-btn.correct .option-label { background: var(--correct); color: white; }
  .option-btn.wrong { border-color: var(--wrong); background: rgba(244, 67, 54, 0.1); animation: shake 0.3s ease; }
  .option-btn.wrong .option-label { background: var(--wrong); color: white; }
  .option-btn:disabled { cursor: default; opacity: 0.7; }
  .option-btn.correct:disabled, .option-btn.wrong:disabled { opacity: 1; }

  .option-btn.eliminated {
    opacity: 0.3;
    cursor: not-allowed;
    border-style: dashed;
  }

  /* Results Screen */
  .results-card {
    background: var(--card-bg);
    border-radius: 20px;
    padding: 30px 24px;
    box-shadow: var(--shadow);
    text-align: center;
    margin-bottom: 16px;
    transition: background 0.3s;
  }

  .results-emoji { font-size: 56px; margin-bottom: 12px; }
  .results-score { font-size: 48px; font-weight: 900; margin-bottom: 4px; }
  .results-score span { color: var(--text-secondary); font-size: 24px; }
  .results-points { font-size: 20px; color: var(--flame); font-weight: 700; margin-bottom: 16px; }

  .results-details {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
    margin-bottom: 20px;
  }

  .result-detail {
    padding: 12px;
    background: var(--bg-secondary);
    border-radius: 12px;
    transition: background 0.3s;
  }

  .result-detail-value { font-size: 20px; font-weight: 800; }
  .result-detail-label { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; margin-top: 2px; }

  .share-btn {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 14px;
    background: linear-gradient(135deg, #3390ec, #5eb5f7);
    color: white;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    margin-bottom: 10px;
    transition: all 0.2s;
    box-shadow: 0 4px 15px rgba(51, 144, 236, 0.4);
  }

  .share-btn:active { transform: scale(0.98); }

  .home-btn {
    width: 100%;
    padding: 14px;
    border: 2px solid var(--border);
    border-radius: 14px;
    background: transparent;
    color: var(--text);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .home-btn:hover { background: var(--bg-secondary); }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: rgba(0,0,0,0.85);
    color: white;
    padding: 12px 24px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 600;
    z-index: 1000;
    transition: transform 0.3s ease;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Confetti */
  .confetti-container {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 999;
  }

  .confetti-piece {
    position: absolute;
    width: 10px; height: 10px;
    border-radius: 2px;
    animation: confetti 1.5s ease forwards;
  }
</style>
</head>
<body>

<!-- Theme Toggle Button -->
<button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" title="Toggle dark/light mode">🌙</button>

<!-- HOME SCREEN -->
<div id="screen-home" class="screen active">
  <div class="user-header">
    <div class="avatar" id="user-avatar"></div>
    <div class="user-info">
      <h2 id="user-name">Player</h2>
      <p id="user-handle">@player</p>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-icon">🪙</div>
      <div class="stat-value" id="home-coins">0</div>
      <div class="stat-label">Coins</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">🔥</div>
      <div class="stat-value" id="home-streak">0</div>
      <div class="stat-label">Streak</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">⚡</div>
      <div class="stat-value" id="home-multiplier">x1</div>
      <div class="stat-label">Multiplier</div>
      <div class="multiplier-badge" id="home-mult-badge">Active</div>
    </div>
  </div>

  <button class="play-btn" id="play-btn" onclick="startQuiz()">
    ▶ Play Today's Quiz
  </button>
  <div class="countdown-text" id="countdown-text"></div>

  <div class="shop-section">
    <div class="section-title">🛒 Power-Ups</div>
    <div class="shop-items">
      <button class="shop-item" id="shop-hint" onclick="buyHint()">
        <div class="shop-item-icon">💡</div>
        <div class="shop-item-name">5x Hints</div>
        <div class="shop-item-cost">🪙 15 each</div>
        <div class="shop-item-owned" id="hint-count"></div>
      </button>
      <button class="shop-item" id="shop-freeze" onclick="buyFreeze()">
        <div class="shop-item-icon">🧊</div>
        <div class="shop-item-name">Streak Freeze</div>
        <div class="shop-item-cost">🪙 50</div>
        <div class="shop-item-owned" id="freeze-status"></div>
      </button>
    </div>
  </div>

  <div class="leaderboard">
    <div class="section-title">🏆 Top Streaks</div>
    <div id="leaderboard-list"></div>
  </div>
</div>

<!-- QUIZ SCREEN -->
<div id="screen-quiz" class="screen">
  <div class="quiz-header">
    <div class="quiz-progress" id="quiz-progress">1 / 5</div>
    <div class="quiz-timer" id="quiz-timer">
      <svg class="timer-ring">
        <circle class="timer-bg"></circle>
        <circle class="timer-progress" id="timer-progress"></circle>
      </svg>
      <span id="timer-text">15</span>
    </div>
    <button class="hint-btn" id="use-hint-btn" onclick="useHint()">💡 Hint</button>
  </div>

  <div class="question-card">
    <div class="question-category" id="q-category"></div>
    <div class="question-text" id="q-text"></div>
  </div>

  <div class="options-grid" id="options-grid"></div>
</div>

<!-- RESULTS SCREEN -->
<div id="screen-results" class="screen">
  <div class="results-card">
    <div class="results-emoji" id="results-emoji">🎉</div>
    <div class="results-score" id="results-score">0<span>/5</span></div>
    <div class="results-points" id="results-points">+0 points</div>

    <div class="results-details">
      <div class="result-detail">
        <div class="result-detail-value" id="res-correct">0</div>
        <div class="result-detail-label">Correct</div>
      </div>
      <div class="result-detail">
        <div class="result-detail-value" id="res-streak">0</div>
        <div class="result-detail-label">Streak 🔥</div>
      </div>
      <div class="result-detail">
        <div class="result-detail-value" id="res-mult">x1</div>
        <div class="result-detail-label">Multiplier</div>
      </div>
    </div>
  </div>

  <button class="share-btn" onclick="shareResult()">📤 Share to Telegram</button>
  <button class="home-btn" onclick="goHome()">← Back to Home</button>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Confetti container -->
<div class="confetti-container" id="confetti-container"></div>

// ============================================================
// DARK / LIGHT MODE TOGGLE
// ============================================================

/**
 * Initialize theme from localStorage or system preference.
 */
function initTheme() {
  try {
    const saved = localStorage.getItem('trivia_theme');
    if (saved) {
      setTheme(saved);
      return;
    }
  } catch (e) {}

  // Default to system preference
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    setTheme('dark');
  } else {
    setTheme('light');
  }
}

/**
 * Set the theme and update the toggle button icon.
 */
function setTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  const btn = document.getElementById('theme-toggle');
  btn.textContent = theme === 'dark' ? '☀️' : '🌙';
  try {
    localStorage.setItem('trivia_theme', theme);
  } catch (e) {}
}

/**
 * Toggle between dark and light mode.
 */
function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme');
  setTheme(current === 'dark' ? 'light' : 'dark');
}

const DEFAULT_USER_DATA = {
  coins: 50,
  currentStreak: 0,
  bestStreak: 0,
  lastPlayedDate: null,
  hints: 0,
  streakFreeze: false,
  freezeUsed: false,
  totalGamesPlayed: 0,
  totalCorrect: 0,
  quizHistory: []
};

function getTodayUTC() {
  const now = new Date();
  return now.getUTCFullYear() + '-' +
    String(now.getUTCMonth() + 1).padStart(2, '0') + '-' +
    String(now.getUTCDate()).padStart(2, '0');
}

function loadUserData() {
  try {
    const raw = localStorage.getItem('trivia_user_data');
    if (!raw) return { ...DEFAULT_USER_DATA };
    return { ...DEFAULT_USER_DATA, ...JSON.parse(raw) };
  } catch (e) {
    return { ...DEFAULT_USER_DATA };
  }
}

function saveUserData(data) {
  try {
    localStorage.setItem('trivia_user_data', JSON.stringify(data));
  } catch (e) {}
}

// ============================================================
// STREAK & MULTIPLIER LOGIC
// ============================================================

/**
 * Multiplier tiers:
 *   Streak 1-2 days  → x1
 *   Streak 3-6 days  → x1.5
 *   Streak 7-13 days → x2
 *   Streak 14+ days  → x3
 */
function getStreakMultiplier(streak) {
  if (streak >= 14) return 3;
  if (streak >= 7) return 2;
  if (streak >= 3) return 1.5;
  return 1;
}

function formatMultiplier(mult) {
  return 'x' + (mult % 1 === 0 ? mult.toFixed(0) : mult.toFixed(1));
}

function isConsecutiveDay(prev, today) {
  if (!prev) return false;
  const d1 = new Date(prev + 'T00:00:00Z');
  const d2 = new Date(today + 'T00:00:00Z');
  return Math.round((d2 - d1) / 86400000) === 1;
}

/**
 * Update streak after a quiz. Returns updated streak fields.
 */
function processStreak(userData, correctCount) {
  const today = getTodayUTC();
  const played = correctCount > 0;
  let { currentStreak, bestStreak, lastPlayedDate, streakFreeze, freezeUsed } = userData;

  if (played) {
    if (!lastPlayedDate) {
      currentStreak = 1;
    } else if (lastPlayedDate === today) {
      // already played
    } else if (isConsecutiveDay(lastPlayedDate, today)) {
      currentStreak += 1;
    } else {
      if (streakFreeze && !freezeUsed) {
        currentStreak += 1;
        freezeUsed = true;
        streakFreeze = false;
      } else {
        currentStreak = 1;
      }
    }
  } else {
    if (lastPlayedDate && lastPlayedDate !== today) {
      if (streakFreeze && !freezeUsed) {
        currentStreak += 1;
        freezeUsed = true;
        streakFreeze = false;
      } else {
        currentStreak = 0;
      }
    }
  }

  if (currentStreak > bestStreak) bestStreak = currentStreak;
  return { currentStreak, bestStreak, lastPlayedDate: today, streakFreeze, freezeUsed };
}

// ============================================================
// COUNTDOWN
// ============================================================

let countdownInterval = null;

function startCountdown() {
  updateCountdown();
  countdownInterval = setInterval(updateCountdown, 1000);
}

function clearCountdown() {
  if (countdownInterval) { clearInterval(countdownInterval); countdownInterval = null; }
}

function updateCountdown() {
  const now = new Date();
  const tomorrow = new Date(Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate() + 1));
  const diff = tomorrow - now;
  if (diff <= 0) {
    clearCountdown();
    document.getElementById('countdown-text').textContent = 'Quiz is available now!';
    document.getElementById('play-btn').disabled = false;
    return;
  }
  const h = Math.floor(diff / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  const s = Math.floor((diff % 60000) / 1000);
  document.getElementById('countdown-text').textContent = `Next quiz in ${h}h ${m}m ${s}s`;
}

// ============================================================
// QUIZ
// ============================================================

function selectQuestions() {
  const shuffled = [...QUESTION_BANK].sort(() => Math.random() - 0.5);
  return shuffled.slice(0, 5);
}

let quizState = { questions: [], currentIndex: 0, score: 0, pointsEarned: 0, answers: [], hintsUsed: 0, questionTimer: null, timeLeft: 15, answered: false };
const QUESTION_TIME = 15;

function startQuiz() {
  const userData = loadUserData();
  const today = getTodayUTC();
  if (userData.lastPlayedDate === today) { showToast("Already played today!"); return; }
  clearCountdown();
  quizState = { questions: selectQuestions(), currentIndex: 0, score: 0, pointsEarned: 0, answers: [], hintsUsed: 0, questionTimer: null, timeLeft: QUESTION_TIME, answered: false };
  showScreen('quiz');
  renderQuestion();
}

function renderQuestion() {
  const q = quizState.questions[quizState.currentIndex];
  quizState.answered = false;
  quizState.timeLeft = QUESTION_TIME;
  document.getElementById('quiz-progress').textContent = `${quizState.currentIndex + 1} / ${quizState.questions.length}`;
  document.getElementById('q-category').textContent = q.category;
  document.getElementById('q-text').textContent = q.question;

  const userData = loadUserData();
  const hintBtn = document.getElementById('use-hint-btn');
  hintBtn.disabled = userData.hints <= 0;
  hintBtn.textContent = `💡 Hint (${userData.hints})`;

  const grid = document.getElementById('options-grid');
  grid.innerHTML = '';
  const labels = ['A', 'B', 'C', 'D'];
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="option-label">${labels[i]}</span><span>${opt}</span>`;
    btn.onclick = () => selectAnswer(i);
    grid.appendChild(btn);
  });
  startQuestionTimer();
}

function startQuestionTimer() {
  clearQuestionTimer();
  const timerText = document.getElementById('timer-text');
  const timerProgress = document.getElementById('timer-progress');
  const timerEl = document.getElementById('quiz-timer');
  const circ = 2 * Math.PI * 21;
  timerProgress.style.strokeDasharray = circ;
  timerProgress.style.strokeDashoffset = 0;
  timerProgress.classList.remove('warning');
  timerEl.classList.remove('warning');
  quizState.timeLeft = QUESTION_TIME;
  timerText.textContent = quizState.timeLeft;

  quizState.questionTimer = setInterval(() => {
    quizState.timeLeft--;
    timerText.textContent = Math.max(0, quizState.timeLeft);
    timerProgress.style.strokeDashoffset = (1 - quizState.timeLeft / QUESTION_TIME) * circ;
    if (quizState.timeLeft <= 5) { timerProgress.classList.add('warning'); timerEl.classList.add('warning'); }
    if (quizState.timeLeft <= 0) { clearQuestionTimer(); if (!quizState.answered) timeUp(); }
  }, 1000);
}

function clearQuestionTimer() { if (quizState.questionTimer) { clearInterval(quizState.questionTimer); quizState.questionTimer = null; } }

function timeUp() {
  quizState.answered = true;
  const q = quizState.questions[quizState.currentIndex];
  document.querySelectorAll('.option-btn').forEach((btn, i) => { btn.disabled = true; if (i === q.correctAnswerIndex) btn.classList.add('correct'); });
  quizState.answers.push({ selected: -1, correct: false });
  setTimeout(() => nextQuestion(), 1200);
}

function selectAnswer(index) {
  if (quizState.answered) return;
  quizState.answered = true;
  clearQuestionTimer();
  const q = quizState.questions[quizState.currentIndex];
  const isCorrect = index === q.correctAnswerIndex;
  document.querySelectorAll('.option-btn').forEach((btn, i) => { btn.disabled = true; if (i === q.correctAnswerIndex) btn.classList.add('correct'); if (i === index && !isCorrect) btn.classList.add('wrong'); });
  if (isCorrect) { quizState.score++; try { Telegram.WebApp.HapticFeedback.notificationOccurred('success'); } catch(e) {} }
  else { try { Telegram.WebApp.HapticFeedback.notificationOccurred('error'); } catch(e) {} }
  quizState.answers.push({ selected: index, correct: isCorrect });
  setTimeout(() => nextQuestion(), 1200);
}

function nextQuestion() {
  quizState.currentIndex++;
  if (quizState.currentIndex >= quizState.questions.length) finishQuiz();
  else renderQuestion();
}

function useHint() {
  if (quizState.answered) return;
  const userData = loadUserData();
  if (userData.hints <= 0) { showToast("No hints left!"); return; }
  userData.hints--;
  saveUserData(userData);
  const q = quizState.questions[quizState.currentIndex];
  const wrong = q.options.map((_, i) => i).filter(i => i !== q.correctAnswerIndex).sort(() => Math.random() - 0.5).slice(0, 2);
  const btns = document.querySelectorAll('.option-btn');
  wrong.forEach(i => { btns[i].classList.add('eliminated'); btns[i].disabled = true; });
  const hintBtn = document.getElementById('use-hint-btn');
  hintBtn.disabled = userData.hints <= 0;
  hintBtn.textContent = `💡 Hint (${userData.hints})`;
  quizState.hintsUsed++;
  showToast("2 wrong answers removed!");
}

// ============================================================
// FINISH QUIZ & RESULTS
// ============================================================

function finishQuiz() {
  clearQuestionTimer();
  const userData = loadUserData();
  const { currentStreak, bestStreak, streakFreeze, freezeUsed } = processStreak(userData, quizState.score);
  const multiplier = getStreakMultiplier(currentStreak);
  const pointsEarned = quizState.score * 10 * multiplier;
  quizState.pointsEarned = pointsEarned;

  saveUserData({
    ...userData, coins: userData.coins + pointsEarned,
    currentStreak, bestStreak, lastPlayedDate: getTodayUTC(),
    streakFreeze, freezeUsed,
    totalGamesPlayed: userData.totalGamesPlayed + 1,
    totalCorrect: userData.totalCorrect + quizState.score,
    quizHistory: [...userData.quizHistory, { date: getTodayUTC(), score: quizState.score, points: pointsEarned, multiplier }].slice(-30)
  });

  showResults(quizState.score, pointsEarned, currentStreak, multiplier);
  if (quizState.score === 5) setTimeout(showConfetti, 300);
}

function showResults(score, points, streak, multiplier) {
  showScreen('results');
  const emojis = ['😢', '😐', '🙂', '😊', '🎉', '🏆'];
  document.getElementById('results-emoji').textContent = emojis[score] || '🙂';
  document.getElementById('results-score').innerHTML = `${score}<span>/5</span>`;
  document.getElementById('results-points').textContent = `+${points} points`;
  document.getElementById('res-correct').textContent = score;
  document.getElementById('res-streak').textContent = streak;
  document.getElementById('res-mult').textContent = formatMultiplier(multiplier);
}

// ============================================================
// SHARE
// ============================================================

function shareResult() {
  const userData = loadUserData();
  const text = `🔥 Daily Trivia Streak Quiz\n\nScore: ${quizState.score}/5\nPoints: +${quizState.pointsEarned}\nStreak: ${userData.currentStreak} days\nMultiplier: ${formatMultiplier(getStreakMultiplier(userData.currentStreak))}\n\nCan you beat my streak?`;
  if (typeof Telegram !== 'undefined' && Telegram.WebApp) {
    try { Telegram.WebApp.switchInlineQuery(text, ['users', 'groups', 'channels']); } catch(e) { copyToClipboard(text); showToast("Copied to clipboard!"); }
  } else { copyToClipboard(text); showToast("Copied to clipboard!"); }
}

function copyToClipboard(text) {
  if (navigator.clipboard) { navigator.clipboard.writeText(text).catch(() => {}); }
  else { const ta = document.createElement('textarea'); ta.value = text; ta.style.position = 'fixed'; ta.style.left = '-9999px'; document.body.appendChild(ta); ta.select(); try { document.execCommand('copy'); } catch(e) {} document.body.removeChild(ta); }
}

// SHOP
// ============================================================

function buyHint() {
  const userData = loadUserData();
  if (userData.coins < 15) { showToast("Not enough coins!"); return; }
  userData.coins -= 15; userData.hints += 1;
  saveUserData(userData); showToast("💡 Hint purchased!"); renderHome();
}

function buyFreeze() {
  const userData = loadUserData();
  if (userData.streakFreeze) { showToast("Already have a Streak Freeze!"); return; }
  if (userData.coins < 50) { showToast("Not enough coins!"); return; }
  userData.coins -= 50; userData.streakFreeze = true; userData.freezeUsed = false;
  saveUserData(userData); showToast("🧊 Streak Freeze activated!"); renderHome();
}

// ============================================================
// UI HELPERS
// ============================================================

function showScreen(name) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById('screen-' + name).classList.add('active'); }

function renderHome() {
  const userData = loadUserData();
  const multiplier = getStreakMultiplier(userData.currentStreak);
  const hasPlayed = userData.lastPlayedDate === getTodayUTC();

  document.getElementById('user-name').textContent = tgUser.firstName + (tgUser.lastName ? ' ' + tgUser.lastName : '');
  document.getElementById('user-handle').textContent = tgUser.username ? '@' + tgUser.username : 'ID: ' + tgUser.id;

  const avatarEl = document.getElementById('user-avatar');
  if (tgUser.photoUrl) avatarEl.innerHTML = `<img src="${tgUser.photoUrl}" alt="avatar">`;
  else avatarEl.textContent = tgUser.firstName.charAt(0).toUpperCase();

  document.getElementById('home-coins').textContent = userData.coins;
  document.getElementById('home-streak').textContent = userData.currentStreak;
  document.getElementById('home-multiplier').textContent = formatMultiplier(multiplier);

  const badge = document.getElementById('home-mult-badge');
  if (multiplier > 1) { badge.style.display = 'inline-block'; badge.textContent = multiplier >= 3 ? 'MAX' : 'Active'; }
  else badge.style.display = 'none';

  const playBtn = document.getElementById('play-btn');
  if (hasPlayed) { playBtn.disabled = true; playBtn.textContent = '✓ Already Played Today'; startCountdown(); }
  else { playBtn.disabled = false; playBtn.textContent = "▶ Play Today's Quiz"; document.getElementById('countdown-text').textContent = ''; clearCountdown(); }

  document.getElementById('hint-count').textContent = userData.hints > 0 ? `${userData.hints} owned` : '';
  document.getElementById('freeze-status').textContent = userData.streakFreeze ? (userData.freezeUsed ? 'Used' : 'Active ✓') : '';
  renderLeaderboard();
}

function goHome() { clearQuestionTimer(); showScreen('home'); renderHome(); }

function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500); }

function showConfetti() {
  const c = document.getElementById('confetti-container'); c.innerHTML = '';
  const colors = ['#ff6b35', '#ffc107', '#4caf50', '#3390ec', '#e91e63', '#9c27b0'];
  for (let i = 0; i < 40; i++) {
    const p = document.createElement('div'); p.className = 'confetti-piece';
    p.style.left = Math.random() * 100 + '%'; p.style.top = Math.random() * 60 + 20 + '%';
    p.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
    p.style.animationDelay = Math.random() * 0.5 + 's'; p.style.animationDuration = (1 + Math.random()) + 's';
    p.style.width = (6 + Math.random() * 8) + 'px'; p.style.height = (6 + Math.random() * 8) + 'px';
    c.appendChild(p);
  }
  setTimeout(() => c.innerHTML = '', 3000);
}
